name: Render Video

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: '要渲染的任务ID'
        required: true
        type: string

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（ffmpeg + 中文字体 + edge-tts + 上传/回调所需库）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk
          pip install --quiet edge-tts requests boto3 Pillow

      - name: 执行渲染
        env:
          TASK_ID: ${{ inputs.task_id }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          RENDER_SECRET: ${{ secrets.RENDER_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          TTS_VOICE: ${{ vars.TTS_VOICE }}
        run: python render.py

      - name: 失败时也要通知Cloudflare（避免任务卡在"合成中"）
        if: failure()
        env:
          TASK_ID: ${{ inputs.task_id }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          RENDER_SECRET: ${{ secrets.RENDER_SECRET }}
        run: |
          curl -s -X POST "$PAGES_BASE_URL/api/render-callback" \
            -H "Content-Type: application/json" \
            -d "{\"task_id\": \"$TASK_ID\", \"secret\": \"$RENDER_SECRET\", \"status\": \"failed\", \"error\": \"渲染步骤执行失败，请查看 GitHub Actions 日志\"}"
