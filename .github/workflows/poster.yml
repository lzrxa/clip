name: Generate Poster

on:
  workflow_dispatch:
    inputs:
      poster_id:
        description: '要生成的海报任务ID'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖（ffmpeg + 中文字体 + Pillow + 二维码库）
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-noto-cjk fonts-noto-cjk-extra
          pip install --quiet requests boto3 Pillow qrcode

      - name: 下载海报标题艺术字体（站酷快乐体，Google Fonts官方OFL开源协议分发，免费商用）
        run: |
          mkdir -p fonts
          curl -sL -o fonts/ZCOOLKuaiLe-Regular.ttf "https://github.com/google/fonts/raw/main/ofl/zcoolkuaile/ZCOOLKuaiLe-Regular.ttf"

      - name: 生成海报
        env:
          POSTER_ID: ${{ inputs.poster_id }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          RENDER_SECRET: ${{ secrets.RENDER_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
        run: python poster.py

      - name: 失败时也要通知Cloudflare
        if: failure()
        env:
          POSTER_ID: ${{ inputs.poster_id }}
          PAGES_BASE_URL: ${{ secrets.PAGES_BASE_URL }}
          RENDER_SECRET: ${{ secrets.RENDER_SECRET }}
        run: |
          curl -s -X POST "$PAGES_BASE_URL/api/poster-callback" \
            -H "Content-Type: application/json" \
            -d "{\"poster_id\": \"$POSTER_ID\", \"secret\": \"$RENDER_SECRET\", \"status\": \"failed\", \"error\": \"海报生成步骤执行失败，请查看 GitHub Actions 日志\"}"
